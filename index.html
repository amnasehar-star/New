<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Happy Anniversary, My Love 💗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffe4ec;
            font-family: 'Helvetica', 'Arial', sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 60px 60px 70px 70px;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2);
            padding: 25px 20px 35px;
            position: relative;
            overflow: visible; /* so decorations can stick out slightly */
        }

        /* Shared decoration style */
        .decoration {
            position: absolute;
            width: 50px;  /* adjust size as needed */
            height: auto;
            pointer-events: none; /* so clicks go through to buttons */
            z-index: 5;
        }

        h1 {
            font-size: 2.2rem;
            text-align: center;
            color: #e8436e;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        .sub {
            text-align: center;
            color: #f48fb1;
            margin-bottom: 25px;
            font-size: 0.9rem;
            border-bottom: 2px dotted #ffc0d0;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 5px;
        }

        .stickers {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0 10px;
        }
        .sticker-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .letter-section {
            background: #fff0f3;
            border-radius: 40px;
            padding: 20px;
            margin: 20px 0;
        }
        .letter-title {
            font-size: 1.4rem;
            color: #d14b6e;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .letter-text {
            width: 100%;
            padding: 12px;
            border-radius: 28px;
            border: 1px solid #ffb7c5;
            background: white;
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 15px;
            resize: vertical;
        }
        .photo-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        .photo-grid img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 25px;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .bouquet-btn, .selfie-btn {
            background: #ff99b9;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 14px 20px;
            border-radius: 40px;
            width: 100%;
            margin: 12px 0;
            cursor: pointer;
        }
        .bouquet-btn:active, .selfie-btn:active {
            transform: scale(0.97);
            background: #e8436e;
        }
        .bouquet-display, .selfie-display {
            background: #fff5f7;
            border-radius: 40px;
            padding: 15px;
            text-align: center;
            margin-top: 5px;
            display: none;
        }
        .bouquet-img {
            max-width: 100%;
            border-radius: 35px;
        }
        .selfie-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #ffb7c5;
            margin: 10px auto;
        }
        .doodles {
            font-size: 2rem;
            letter-spacing: 8px;
            margin-top: 10px;
        }
        footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.7rem;
            color: #f5a3b9;
        }
    </style>
</head>
<body>

<div class="card" id="card">
    <!-- ========== 3 STARS (custom cutouts) ========== -->
    <img class="decoration" id="star1" src="YOUR_STAR_1_URL" style="top: 10px; left: -15px; width: 55px;">
    <img class="decoration" id="star2" src="YOUR_STAR_2_URL" style="top: 50%; right: -20px; width: 60px;">
    <img class="decoration" id="star3" src="YOUR_STAR_3_URL" style="bottom: 20px; left: -10px; width: 50px;">

    <!-- ========== 4 BOWS (custom cutouts) ========== -->
    <img class="decoration" id="bow1" src="YOUR_BOW_1_URL" style="top: 80px; right: -15px; width: 45px;">
    <img class="decoration" id="bow2" src="YOUR_BOW_2_URL" style="top: 200px; left: -20px; width: 50px;">
    <img class="decoration" id="bow3" src="YOUR_BOW_3_URL" style="bottom: 100px; right: -10px; width: 48px;">
    <img class="decoration" id="bow4" src="YOUR_BOW_4_URL" style="bottom: -15px; left: 30%; width: 55px;">

    <h1>💗 Happy Anniversary 💗</h1>
    <div style="text-align: center;"><span class="sub">to the best IT boy in the world</span></div>

    <!-- Stickers (Pink Panther + Angry Bird) -->
    <div class="stickers">
        <img id="pinkPanther" class="sticker-img" src="YOUR_PINK_PANTHER_URL" alt="Pink Panther">
        <img id="angryBird" class="sticker-img" src="YOUR_PINK_ANGRY_BIRD_URL" alt="Pink Angry Bird">
    </div>

    <!-- Interactive Letter -->
    <div class="letter-section">
        <div class="letter-title">💌 My love letter to you</div>
        <textarea class="letter-text" id="loveLetter" rows="5" placeholder="Write your feelings here..."></textarea>
        <div class="photo-grid" id="photoGrid"></div>
    </div>

    <!-- Bouquet button -->
    <button class="bouquet-btn" id="bouquetBtn">💐 Click for a bouquet 💐</button>
    <div class="bouquet-display" id="bouquetDisplay">
        <img class="bouquet-img" id="bouquetImage" src="" alt="Bouquet">
    </div>

    <!-- Selfie button -->
    <button class="selfie-btn" id="selfieBtn">📸 Our cute selfie + doodles</button>
    <div class="selfie-display" id="selfieDisplay">
        <img class="selfie-img" id="selfieImage" src="" alt="Cute selfie">
        <div class="doodles" id="doodlesArea">✨🌸🎀⭐💖</div>
    </div>

    <footer>made with ❤️ on GitHub</footer>
</div>

<script>
    // ========== YOUR IMAGE URLs – REPLACE THESE ==========
    // 3 photos for the letter
    const photoUrls = [
        "YOUR_PHOTO_1_URL",
        "YOUR_PHOTO_2_URL",
        "YOUR_PHOTO_3_URL"
    ];
    // Bouquet image
    const bouquetUrl = "YOUR_BOUQUET_URL";
    // Selfie image
    const selfieUrl = "YOUR_SELFIE_URL";
    // ====================================================

    // Load photos
    const photoGrid = document.getElementById('photoGrid');
    photoUrls.forEach(url => {
        if (url && !url.includes("YOUR_PHOTO")) {
            const img = document.createElement('img');
            img.src = url;
            img.alt = "Memory";
            photoGrid.appendChild(img);
        }
    });
    if (photoGrid.children.length === 0) {
        photoGrid.innerHTML = "<p style='color:#f5a3b9;'>✨ Add your 3 photos ✨</p>";
    }

    // Bouquet
    const bouquetBtn = document.getElementById('bouquetBtn');
    const bouquetDisplay = document.getElementById('bouquetDisplay');
    const bouquetImage = document.getElementById('bouquetImage');
    bouquetBtn.addEventListener('click', () => {
        bouquetImage.src = bouquetUrl;
        bouquetDisplay.style.display = 'block';
        bouquetDisplay.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    // Selfie + doodles
    const selfieBtn = document.getElementById('selfieBtn');
    const selfieDisplay = document.getElementById('selfieDisplay');
    const selfieImage = document.getElementById('selfieImage');
    selfieBtn.addEventListener('click', () => {
        selfieImage.src = selfieUrl;
        selfieDisplay.style.display = 'block';
        const doodles = ['🌸','🎀','⭐','💖','✨','🐾','🎈','💗'];
        const randomDoodles = Array.from({ length: 8 }, () => doodles[Math.floor(Math.random() * doodles.length)]).join(' ');
        document.getElementById('doodlesArea').innerHTML = randomDoodles;
        selfieDisplay.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    // Pre-fill letter with a sweet message (optional)
    const letterBox = document.getElementById('loveLetter');
    letterBox.value = "My love,\n\nI built this page just for you. Every star and bow is our inside story.\n\nI love you more than any code.\n\nHappy Anniversary 💗";
</script>
</body>
</html>
